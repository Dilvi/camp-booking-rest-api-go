services:
  db:
    image: postgres:16-alpine
    container_name: camp_booking_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: camp_booking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: camp_booking_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      APP_PORT: 8080
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: camp_booking
      DB_SSLMODE: disable
      JWT_SECRET: supersecretkey

  migrate:
    image: migrate/migrate:4
    profiles: ["tools"]
    volumes:
      - ./migrations:/migrations
    depends_on:
      - db
    entrypoint: [
      "migrate",
      "-path", "/migrations",
      "-database", "postgres://postgres:postgres@db:5432/camp_booking?sslmode=disable"
    ]

volumes:
  postgres_data: